name: Commitlint

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  commitlint:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR title
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js
          helpURL: https://www.conventionalcommits.org/
